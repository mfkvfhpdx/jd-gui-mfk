help.usage=Usage: jd-gui [option] [input-file] ...\n\nOptions:\n -h, --help                Show this help message and exit\n --save-all-sources, -s    Save all sources from input file (headless mode)\n                           Usage: --save-all-sources [options] <input-file> [output-file]\n --no-metadata             Omit file-end metadata comments (non-default)\n --no-line-numbers         Omit per-line comments like /*    */ and /* 22 */ (non-default)\n --no-comments             Shorthand for --no-metadata --no-line-numbers\n --keep-nested-archives    Keep nested jar/zip files as-is instead of decompiling (non-default)\n\nExamples:\n jd-gui app.jar\n java -jar jd-gui.jar --save-all-sources app.jar\n java -jar jd-gui.jar -s --no-comments --keep-nested-archives app.jar output.src.zip
