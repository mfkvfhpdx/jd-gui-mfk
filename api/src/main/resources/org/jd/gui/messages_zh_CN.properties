help.usage=用法: jd-gui [选项] [输入文件] ...\n\n选项:\n -h, --help                显示此帮助信息并退出\n --save-all-sources, -s    无界面模式保存全部源码\n                           用法: --save-all-sources [选项] <输入文件> [输出文件]\n --no-metadata             不写入文件末尾元数据注释（非默认）\n --no-line-numbers         不写入行首注释如 /*    */、/* 22 */（非默认）\n --no-comments             等同于 --no-metadata --no-line-numbers\n --keep-nested-archives    嵌套 jar/zip 原样保留，不反编译（非默认）\n\n示例:\n jd-gui app.jar\n java -jar jd-gui.jar --save-all-sources app.jar\n java -jar jd-gui.jar -s --no-comments --keep-nested-archives app.jar output.src.zip
